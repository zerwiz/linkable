[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_PRIVATE_STANDALONE = "false"

[cache]
  path = ".next/cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
