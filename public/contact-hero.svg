<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <rect width="600" height="500" rx="20" fill="#f8fafc"/>
  
  <!-- Background geometric shapes -->
  <circle cx="480" cy="80" r="100" fill="#f59e0b" opacity="0.08"/>
  <circle cx="120" cy="420" r="140" fill="#f59e0b" opacity="0.06"/>
  <rect x="380" y="320" width="160" height="160" rx="16" fill="#f59e0b" opacity="0.04"/>

  <!-- Hard hat -->
  <g transform="translate(120, 60)">
    <ellipse cx="60" cy="80" rx="70" ry="20" fill="#eab308" opacity="0.3"/>
    <path d="M10 80 Q10 30 60 20 Q110 30 110 80" fill="#eab308"/>
    <rect x="15" y="75" rx="4" width="90" height="12" fill="#ca8a04" opacity="0.6"/>
    <path d="M45 35 L50 20 L70 20 L75 35" fill="#ca8a04" opacity="0.5"/>
  </g>

  <!-- Message bubble 1 -->
  <g transform="translate(310, 50)">
    <rect x="0" y="0" width="200" height="140" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="28" cy="30" r="8" fill="#f59e0b"/>
    <rect x="48" y="24" width="100" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="48" y="34" width="70" height="4" rx="2" fill="#cbd5e1"/>
    <circle cx="28" cy="70" r="8" fill="#f59e0b"/>
    <rect x="48" y="64" width="120" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="48" y="74" width="90" height="4" rx="2" fill="#cbd5e1"/>
    <circle cx="28" cy="110" r="8" fill="#f59e0b"/>
    <rect x="48" y="104" width="80" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="48" y="114" width="110" height="4" rx="2" fill="#cbd5e1"/>
    <path d="M185 140 L195 155 L175 155 Z" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>

  <!-- Message bubble 2 -->
  <g transform="translate(200, 230)">
    <rect x="0" y="0" width="220" height="100" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="30" r="12" fill="#1e293b"/>
    <rect x="62" y="24" width="130" height="5" rx="2" fill="#1e293b" opacity="0.7"/>
    <rect x="62" y="36" width="90" height="4" rx="2" fill="#94a3b8"/>
    <circle cx="40" cy="68" r="12" fill="#1e293b"/>
    <rect x="62" y="62" width="110" height="5" rx="2" fill="#1e293b" opacity="0.7"/>
    <rect x="62" y="74" width="140" height="4" rx="2" fill="#94a3b8"/>
    <path d="M15 100 L5 115 L25 115 Z" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>

  <!-- Map pin -->
  <g transform="translate(450, 220)">
    <path d="M30 5 Q10 35 10 45 Q10 65 30 75 Q50 65 50 45 Q50 35 30 5 Z" fill="#f59e0b" opacity="0.8"/>
    <circle cx="30" cy="42" r="10" fill="white"/>
    <rect x="24" y="72" rx="2" width="12" height="30" fill="#f59e0b" opacity="0.8"/>
    <rect x="10" y="102" rx="4" width="40" height="8" fill="#f59e0b" opacity="0.4"/>
  </g>

  <!-- Phone illustration -->
  <g transform="translate(40, 250)">
    <rect x="10" y="0" width="50" height="90" rx="8" fill="#1e293b"/>
    <rect x="16" y="8" width="38" height="60" rx="4" fill="#f8fafc"/>
    <rect x="20" y="72" width="30" height="4" rx="2" fill="#475569"/>
    <circle cx="35" cy="84" r="3" fill="#475569"/>
  </g>

  <!-- Decorative lines -->
  <line x1="50" y1="180" x2="180" y2="180" stroke="#f59e0b" stroke-width="2" opacity="0.2" stroke-dasharray="6 4"/>
  <line x1="350" y1="300" x2="500" y2="300" stroke="#f59e0b" stroke-width="2" opacity="0.2" stroke-dasharray="6 4"/>
  <line x1="100" y1="400" x2="250" y2="400" stroke="#f59e0b" stroke-width="2" opacity="0.15" stroke-dasharray="6 4"/>

  <!-- Connection dots -->
  <circle cx="300" cy="195" r="4" fill="#f59e0b" opacity="0.4"/>
  <circle cx="330" cy="210" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="270" cy="210" r="3" fill="#f59e0b" opacity="0.3"/>
</svg>
