<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Hard hat icon -->
  <g transform="translate(140, 200)">
    <rect x="0" y="30" width="160" height="100" rx="12" fill="#f59e0b"/>
    <path d="M30,30 Q80,0 130,30 L130,50 L30,50 Z" fill="#f59e0b"/>
    <rect x="40" y="60" width="80" height="12" rx="4" fill="#d97706"/>
    <rect x="60" y="80" width="40" height="8" rx="4" fill="#d97706"/>
  </g>

  <!-- LinkableWork text -->
  <text x="340" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">Linkable</text>
  <text x="340" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#f59e0b" letter-spacing="-1">Work</text>

  <!-- Tagline -->
  <text x="340" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Partner Portal for Construction Recruitment</text>

  <!-- Decorative line -->
  <rect x="340" y="420" width="80" height="4" rx="2" fill="#f59e0b"/>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f172a" opacity="0.5"/>
  <text x="600" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">Connecting skilled workers with construction projects across Sweden</text>
</svg>
